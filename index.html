<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Моя любимая жена</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
    -webkit-user-select: none;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  /* Видео фон */
  .video-background {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -2;
  }

  .video-background video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* Затемнение поверх видео */
  .overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.4);
    z-index: -1;
  }

  /* Главный экран */
  .main-screen {
    position: relative;
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .main-title {
    font-size: clamp(48px, 10vw, 120px);
    font-weight: 900;
    color: white;
    text-align: center;
    text-shadow: 
      0 0 20px rgba(255, 255, 255, 0.8),
      0 0 40px rgba(255, 255, 255, 0.6),
      0 0 60px rgba(255, 255, 255, 0.4),
      4px 4px 8px rgba(0, 0, 0, 0.5);
    animation: glow 3s ease-in-out infinite alternate, fadeIn 2s ease;
    line-height: 1.2;
    margin-bottom: 20px;
    letter-spacing: 2px;
  }

  @keyframes glow {
    from {
      text-shadow: 
        0 0 20px rgba(255, 255, 255, 0.8),
        0 0 40px rgba(255, 255, 255, 0.6),
        0 0 60px rgba(255, 255, 255, 0.4),
        4px 4px 8px rgba(0, 0, 0, 0.5);
    }
    to {
      text-shadow: 
        0 0 30px rgba(255, 100, 150, 1),
        0 0 60px rgba(255, 100, 150, 0.8),
        0 0 90px rgba(255, 100, 150, 0.6),
        4px 4px 8px rgba(0, 0, 0, 0.5);
    }
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(-30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .subtitle {
    font-size: clamp(24px, 5vw, 60px);
    color: white;
    text-align: center;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    animation: fadeIn 2s ease 0.5s both;
    margin-bottom: 40px;
  }

  .heart {
    display: inline-block;
    font-size: clamp(40px, 8vw, 100px);
    color: #ff4757;
    animation: heartbeat 1.5s ease-in-out infinite;
    margin: 0 20px;
  }

  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    25% { transform: scale(1.1); }
    50% { transform: scale(1); }
    75% { transform: scale(1.1); }
  }

  /* Кнопка галереи */
  .gallery-btn {
    padding: 20px 50px;
    font-size: clamp(18px, 3vw, 28px);
    font-weight: 600;
    color: white;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 10px 40px rgba(102, 126, 234, 0.5);
    transition: all 0.3s;
    animation: fadeIn 2s ease 1s both;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .gallery-btn:hover {
    transform: translateY(-5px) scale(1.05);
    box-shadow: 0 15px 50px rgba(102, 126, 234, 0.7);
  }

  .gallery-btn:active {
    transform: translateY(0) scale(1);
  }

  /* Модальное окно галереи */
  .gallery-modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.95);
    z-index: 1000;
    overflow-y: auto;
    padding: 40px 20px;
  }

  .gallery-modal.active {
    display: block;
    animation: fadeIn 0.5s ease;
  }

  .gallery-header {
    text-align: center;
    margin-bottom: 40px;
  }

  .gallery-header h2 {
    font-size: clamp(32px, 6vw, 60px);
    color: white;
    text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
    margin-bottom: 10px;
  }

  .gallery-header p {
    color: rgba(255, 255, 255, 0.7);
    font-size: 18px;
  }

  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 30px;
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px;
  }

  .gallery-item {
    position: relative;
    border-radius: 20px;
    overflow: hidden;
    cursor: pointer;
    aspect-ratio: 1;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    transition: all 0.3s;
    background: #1a1a1a;
  }

  .gallery-item:hover {
    transform: scale(1.05);
    box-shadow: 0 15px 50px rgba(102, 126, 234, 0.6);
  }

  .gallery-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
    -webkit-user-drag: none;
  }

  .gallery-item .photo-number {
    position: absolute;
    top: 15px;
    right: 15px;
    background: rgba(102, 126, 234, 0.9);
    color: white;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 18px;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
  }

  .close-btn {
    position: fixed;
    top: 30px;
    right: 30px;
    width: 60px;
    height: 60px;
    border: none;
    background: rgba(255, 255, 255, 0.2);
    color: white;
    border-radius: 50%;
    font-size: 32px;
    cursor: pointer;
    transition: all 0.3s;
    z-index: 1001;
    backdrop-filter: blur(10px);
  }

  .close-btn:hover {
    background: rgba(239, 68, 68, 0.8);
    transform: rotate(90deg);
  }

  /* Lightbox */
  .lightbox {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.98);
    z-index: 2000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .lightbox.active {
    display: flex;
    animation: fadeIn 0.3s ease;
  }

  .lightbox img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 15px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
    pointer-events: none;
    -webkit-user-drag: none;
  }

  .lightbox-close {
    position: absolute;
    top: 30px;
    right: 30px;
    width: 60px;
    height: 60px;
    border: none;
    background: rgba(255, 255, 255, 0.2);
    color: white;
    border-radius: 50%;
    font-size: 32px;
    cursor: pointer;
    transition: all 0.3s;
    backdrop-filter: blur(10px);
  }

  .lightbox-close:hover {
    background: rgba(239, 68, 68, 0.8);
    transform: rotate(90deg);
  }

  .lightbox-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 70px;
    height: 70px;
    border: none;
    background: rgba(255, 255, 255, 0.2);
    color: white;
    border-radius: 50%;
    font-size: 32px;
    cursor: pointer;
    transition: all 0.3s;
    backdrop-filter: blur(10px);
  }

  .lightbox-nav:hover {
    background: rgba(102, 126, 234, 0.8);
    transform: translateY(-50%) scale(1.1);
  }

  .lightbox-prev { left: 30px; }
  .lightbox-next { right: 30px; }

  .lightbox-counter {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 20px;
    background: rgba(0, 0, 0, 0.6);
    padding: 12px 30px;
    border-radius: 30px;
    backdrop-filter: blur(10px);
  }

  /* Защита от копирования */
  .no-copy {
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    -khtml-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
  }

  /* Адаптивность */
  @media (max-width: 768px) {
    .gallery-grid {
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
    }

    .gallery-item {
      aspect-ratio: 1;
    }

    .close-btn, .lightbox-close {
      width: 50px;
      height: 50px;
      font-size: 24px;
    }

    .lightbox-nav {
      width: 50px;
      height: 50px;
      font-size: 24px;
    }

    .lightbox-prev { left: 15px; }
    .lightbox-next { right: 15px; }
  }

  @media (max-width: 480px) {
    .gallery-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      padding: 10px;
    }
  }

  /* Отключение контекстного меню */
  .no-context-menu {
    -webkit-touch-callout: none;
  }
</style>
</head>
<body class="no-copy">

<!-- Видео фон -->
<div class="video-background">
  <video autoplay muted loop playsinline id="bgVideo">
    <source src="12345.mp4" type="video/mp4">
  </video>
</div>

<!-- Затемнение -->
<div class="overlay"></div>

<!-- Главный экран -->
<div class="main-screen">
  <h1 class="main-title">МОЯ ЛЮБИМАЯ ЖЕНА</h1>
  <div class="subtitle">
    <span class="heart">❤️</span>
    Я ТЕБЯ ОБОЖАЮ
    <span class="heart">❤️</span>
  </div>
  <button class="gallery-btn" onclick="openGallery()">
     Как всё начиналось
  </button>
</div>

<!-- Модальное окно галереи -->
<div class="gallery-modal" id="galleryModal">
  <button class="close-btn" onclick="closeGallery()">✕</button>
  
  <div class="gallery-header">
    <h2>💫 Как всё начиналось</h2>
    <p>Нажмите на фото для увеличения</p>
  </div>

  <div class="gallery-grid" id="galleryGrid">
    <!-- Фото загружаются через JS -->
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <button class="lightbox-nav lightbox-prev" onclick="changePhoto(-1)">‹</button>
  <img id="lightboxImg" src="" alt="Фото" class="no-copy">
  <button class="lightbox-nav lightbox-next" onclick="changePhoto(1)">›</button>
  <div class="lightbox-counter" id="lightboxCounter">1 / 5</div>
</div>

<script>
  // Список фотографий
  const photos = ['111.png', '222.png', '333.png', '444.png', '555.png'];
  let currentPhotoIndex = 0;

  // Защита от сохранения фото
  function preventSave(e) {
    e.preventDefault();
    return false;
  }

  // Отключение контекстного меню
  document.addEventListener('contextmenu', (e) => {
    if (e.target.tagName === 'IMG') {
      e.preventDefault();
      return false;
    }
  });

  // Отключение перетаскивания
  document.addEventListener('dragstart', (e) => {
    if (e.target.tagName === 'IMG') {
      e.preventDefault();
      return false;
    }
  });

  // Отключение копирования
  document.addEventListener('copy', (e) => {
    e.preventDefault();
    return false;
  });

  // Отключение горячих клавиш сохранения
  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && (e.key === 's' || e.key === 'S')) {
      e.preventDefault();
      return false;
    }
    if ((e.ctrlKey || e.metaKey) && (e.key === 'c' || e.key === 'C')) {
      e.preventDefault();
      return false;
    }
  });

  // Загрузка галереи
  function loadGallery() {
    const grid = document.getElementById('galleryGrid');
    grid.innerHTML = '';

    photos.forEach((photo, index) => {
      const item = document.createElement('div');
      item.className = 'gallery-item no-context-menu';
      item.onclick = () => openLightbox(index);
      item.oncontextmenu = preventSave;

      const img = document.createElement('img');
      img.src = photo;
      img.alt = `Фото ${index + 1}`;
      img.draggable = false;
      img.oncontextmenu = preventSave;
      img.ondragstart = preventSave;
      img.onerror = () => {
        img.src = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400"><rect fill="%23333" width="400" height="400"/><text x="200" y="205" text-anchor="middle" fill="%23999" font-size="24">Фото не найдено</text></svg>';
      };

      const number = document.createElement('div');
      number.className = 'photo-number';
      number.textContent = index + 1;

      item.appendChild(img);
      item.appendChild(number);
      grid.appendChild(item);
    });
  }

  // Открыть галерею
  function openGallery() {
    document.getElementById('galleryModal').classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeGallery() {
    document.getElementById('galleryModal').classList.remove('active');
    document.body.style.overflow = '';
  }

  // Lightbox
  function openLightbox(index) {
    currentPhotoIndex = index;
    updateLightbox();
    document.getElementById('lightbox').classList.add('active');
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
  }

  function changePhoto(direction) {
    currentPhotoIndex += direction;
    if (currentPhotoIndex < 0) currentPhotoIndex = photos.length - 1;
    if (currentPhotoIndex >= photos.length) currentPhotoIndex = 0;
    updateLightbox();
  }

  function updateLightbox() {
    document.getElementById('lightboxImg').src = photos[currentPhotoIndex];
    document.getElementById('lightboxCounter').textContent = 
      `${currentPhotoIndex + 1} / ${photos.length}`;
  }

  // Закрытие по клику вне
  document.getElementById('galleryModal').addEventListener('click', (e) => {
    if (e.target.id === 'galleryModal') closeGallery();
  });

  document.getElementById('lightbox').addEventListener('click', (e) => {
    if (e.target.id === 'lightbox') closeLightbox();
  });

  // Клавиатура
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      closeGallery();
      closeLightbox();
    }
    if (document.getElementById('lightbox').classList.contains('active')) {
      if (e.key === 'ArrowLeft') changePhoto(-1);
      if (e.key === 'ArrowRight') changePhoto(1);
    }
  });

  // Загрузка при старте
  window.addEventListener('load', () => {
    loadGallery();
    
    // Проверка видео
    const video = document.getElementById('bgVideo');
    video.play().catch(e => {
      console.log('Автовоспроизведение видео заблокировано:', e);
    });
  });

  // Предотвращение сохранения через DevTools
  setInterval(() => {
    document.querySelectorAll('img').forEach(img => {
      img.style.pointerEvents = 'none';
    });
  }, 100);
</script>
</body>
</html>
