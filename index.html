<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Калькулятор</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f2f5;
      color: #1a1a1a;
    }

    .calculator {
      background: #fff;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      width: 100%;
      max-width: 360px;
    }

    h1 {
      margin: 0 0 1.5rem;
      font-size: 1.25rem;
      font-weight: 600;
      text-align: center;
    }

    label {
      display: block;
      margin-bottom: 0.35rem;
      font-size: 0.875rem;
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 0.6rem 0.75rem;
      margin-bottom: 1rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
    }

    input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    .buttons {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }

    button {
      flex: 1;
      padding: 0.65rem 1rem;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    #sumBtn {
      background: #2563eb;
      color: #fff;
    }

    #sumBtn:hover {
      background: #1d4ed8;
    }

    #clearBtn {
      background: #e5e7eb;
      color: #374151;
    }

    #clearBtn:hover {
      background: #d1d5db;
    }

    .result-area {
      min-height: 2.5rem;
      padding: 0.75rem;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      font-size: 1.1rem;
      text-align: center;
    }

    .result-area.error {
      color: #dc2626;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <h1>Калькулятор</h1>

    <label for="numA">Число A</label>
    <input type="text" id="numA" autocomplete="off">

    <label for="numB">Число B</label>
    <input type="text" id="numB" autocomplete="off">

    <div class="buttons">
      <button type="button" id="sumBtn">Сумма</button>
      <button type="button" id="clearBtn">Очистить</button>
    </div>

    <div class="result-area" id="result"></div>
  </div>

  <script>
    const numA = document.getElementById('numA');
    const numB = document.getElementById('numB');
    const sumBtn = document.getElementById('sumBtn');
    const clearBtn = document.getElementById('clearBtn');
    const result = document.getElementById('result');

    function parseNumber(value) {
      const trimmed = value.trim();
      if (trimmed === '') return NaN;
      const num = Number(trimmed);
      return Number.isFinite(num) ? num : NaN;
    }

    function showResult(text, isError) {
      result.textContent = text;
      result.classList.toggle('error', isError);
    }

    sumBtn.addEventListener('click', function () {
      const a = parseNumber(numA.value);
      const b = parseNumber(numB.value);

      if (Number.isNaN(a) || Number.isNaN(b)) {
        showResult('Введите два числа', true);
        return;
      }

      showResult(String(a + b), false);
    });

    clearBtn.addEventListener('click', function () {
      numA.value = '';
      numB.value = '';
      showResult('', false);
    });
  </script>
</body>
</html>
